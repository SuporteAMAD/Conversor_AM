name: 🧪 Testes Automatizados

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🔍 Verificar sintaxe Python
        run: |
          python -m py_compile main.py config.py
          for file in rotas/*.py conversores/*.py utils/*.py; do
            if [ -f "$file" ]; then
              python -m py_compile "$file"
            fi
          done

      - name: 📝 Listar testes disponíveis
        run: |
          if [ -f "test_app.py" ]; then
            echo "✅ Arquivo de testes encontrado: test_app.py"
          else
            echo "⚠️ Arquivo de testes não encontrado"
          fi

      - name: 🧪 Executar testes
        run: |
          if [ -f "test_app.py" ]; then
            pytest test_app.py -v --tb=short
          else
            echo "⏭️ Pulando testes (arquivo test_app.py não encontrado)"
          fi
        continue-on-error: true

      - name: ✅ Validar imports
        run: |
          python -c "
          import sys
          try:
              from main import app, get_converter
              print('✅ Imports principais OK')
          except ImportError as e:
              print(f'❌ Erro de import: {e}')
              sys.exit(1)
          "

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar ferramentas de lint
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8

      - name: 🔍 Pylint
        run: |
          pylint main.py config.py --disable=C0111,C0103,W0212 || true

      - name: 🔍 Flake8
        run: |
          flake8 main.py config.py --max-line-length=120 || true
